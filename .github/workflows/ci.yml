name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test
        run: npm install && npm test

      # Temporary: force CI fail on Felix upgrade PRs so we can test auto-remediation.
      - name: Felix remediate test gate
        if: startsWith(github.head_ref, 'felix/upgrade/')
        run: |
          echo "Intentional failure for Felix remediate testing"
          exit 1
